<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteora LP Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --surface2: #131920;
    --surface3: #1a2230;
    --border: #1e2d3d;
    --border2: #243344;
    --text: #e2e8f0;
    --text2: #8899aa;
    --text3: #4a6070;
    --green: #00e676;
    --green-dim: #00e67618;
    --red: #ff4757;
    --red-dim: #ff475718;
    --yellow: #ffd32a;
    --blue: #00b4ff;
    --blue-dim: #00b4ff12;
    --purple: #bf80ff;
    --purple-dim: #bf80ff18;
    --orange: #ff8c42;
    --orange-dim: #ff8c4218;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
  }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,12,16,0.97);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; gap: 16px;
    height: 52px;
  }
  .nav-brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 15px;
    color: var(--green); letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-brand-icon {
    width: 24px; height: 24px;
    background: var(--green-dim);
    border: 1px solid var(--green)44;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .nav-sep { width: 1px; height: 24px; background: var(--border); }
  .nav-info { font-size: 10px; color: var(--text3); letter-spacing: 0.5px; }
  .nav-info span { color: var(--text2); }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .nav-stat { display: flex; flex-direction: column; align-items: flex-end; }
  .nav-stat-val { font-size: 12px; font-weight: 600; color: var(--text); }
  .nav-stat-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }
  .pulse-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  /* MAIN */
  .main { padding: 14px 24px; }

  /* CARDS GRID */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  /* WALLET CARD */
  .wallet-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .wallet-card:hover {
    border-color: var(--border2);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    background: var(--surface3);
    border-bottom: 1px solid var(--border);
  }
  .card-addr-row { display: flex; align-items: center; gap: 8px; }
  .card-addr {
    font-size: 12px; font-weight: 700; color: var(--blue);
    letter-spacing: 0.3px;
  }
  .card-copy {
    font-size: 9px; color: var(--text3);
    cursor: pointer; padding: 2px 5px;
    border: 1px solid var(--border);
    border-radius: 3px;
    transition: all 0.1s;
    background: none;
    font-family: 'JetBrains Mono', monospace;
  }
  .card-copy:hover { color: var(--text2); border-color: var(--border2); }
  .card-totals { display: flex; gap: 14px; align-items: center; }
  .card-total-val { font-size: 13px; font-weight: 700; color: var(--text); }
  .card-pnl { font-size: 11px; font-weight: 600; }

  /* COLUMN HEADERS */
  .card-col-headers {
    display: grid;
    grid-template-columns: 1fr 68px 68px 80px;
    padding: 4px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .cc-h {
    font-size: 9px; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.7px;
    text-align: right;
  }
  .cc-h:first-child { text-align: left; }

  /* POSITION ROW */
  .card-pos-row {
    display: grid;
    grid-template-columns: 1fr 68px 68px 80px;
    padding: 7px 14px;
    border-bottom: 1px solid var(--border)44;
    align-items: center;
    transition: background 0.1s;
  }
  .card-pos-row:last-child { border-bottom: none; }
  .card-pos-row:hover { background: var(--surface2); }

  .cp-left { display: flex; flex-direction: column; gap: 4px; }
  .cp-pair { font-size: 12px; font-weight: 700; color: var(--text); }
  .cp-meta { display: flex; align-items: center; gap: 5px; }

  /* METEORA LINK BUTTON */
  .meteora-link {
    display: inline-flex; align-items: center; gap: 3px;
    text-decoration: none;
    padding: 2px 5px 2px 3px;
    border-radius: 4px;
    border: 1px solid rgba(0,180,255,0.2);
    background: var(--blue-dim);
    transition: all 0.15s;
    cursor: pointer;
  }
  .meteora-link:hover {
    border-color: rgba(0,180,255,0.5);
    background: rgba(0,180,255,0.12);
    transform: translateY(-1px);
  }
  .meteora-logo {
    width: 12px; height: 12px;
    border-radius: 2px;
    object-fit: contain;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    /* SVG inline logo */
  }
  .meteora-link-text {
    font-size: 8px; font-weight: 600;
    color: var(--blue);
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  /* STRATEGY TAG */
  .strategy-tag {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .strat-spot {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid var(--green)33;
  }
  .strat-bidask {
    background: var(--purple-dim);
    color: var(--purple);
    border: 1px solid var(--purple)33;
  }
  .strat-curve {
    background: var(--orange-dim);
    color: var(--orange);
    border: 1px solid var(--orange)33;
  }
  .strat-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor;
    opacity: 0.8;
  }

  .cp-range {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.2px;
    line-height: 1.2;
  }
  .cp-range-token {
    color: var(--text3);
    font-size: 9px;
    opacity: 0.7;
  }

  .cp-cell {
    font-size: 11px; color: var(--text2);
    text-align: right;
  }
  .cp-cell.highlight { color: var(--text); font-weight: 600; }
  .val-pos { color: var(--green) !important; }
  .val-neg { color: var(--red) !important; }

  /* Meteora SVG logo inline */
  .m-svg { width: 12px; height: 12px; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
  .wallet-card { animation: fadeIn 0.25s ease both; }
  .wallet-card:nth-child(1){animation-delay:0.04s}
  .wallet-card:nth-child(2){animation-delay:0.08s}
  .wallet-card:nth-child(3){animation-delay:0.12s}
  .wallet-card:nth-child(4){animation-delay:0.16s}
  .wallet-card:nth-child(5){animation-delay:0.20s}
  .wallet-card:nth-child(6){animation-delay:0.24s}

  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:var(--surface)}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

  /* MANAGE BUTTON */
  .nav-manage-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 5px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.3px;
    transition: all 0.15s;
  }
  .nav-manage-btn:hover { color: var(--text); border-color: var(--green)66; background: var(--green-dim); }
  .nav-manage-btn.active { color: var(--green); border-color: var(--green); background: var(--green-dim); }

  /* DRAWER OVERLAY */
  .drawer-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }

  /* DRAWER PANEL */
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 420px; z-index: 201;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    box-shadow: -8px 0 40px rgba(0,0,0,0.5);
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface3);
    flex-shrink: 0;
  }
  .drawer-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    color: var(--text); letter-spacing: -0.3px;
  }
  .drawer-title span { color: var(--green); }
  .drawer-close {
    width: 28px; height: 28px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text2);
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .drawer-close:hover { color: var(--text); border-color: var(--border2); }

  /* ADD WALLET FORM */
  .drawer-add {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
  }
  .drawer-add-label {
    font-size: 9px; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .drawer-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .drawer-input {
    flex: 1; padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    outline: none; transition: border-color 0.15s;
  }
  .drawer-input:focus { border-color: var(--green)66; }
  .drawer-input::placeholder { color: var(--text3); }
  .drawer-add-btn {
    padding: 8px 14px;
    background: var(--green-dim);
    border: 1px solid var(--green)55;
    border-radius: 5px;
    color: var(--green); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .drawer-add-btn:hover { background: var(--green)22; border-color: var(--green); }
  .drawer-add-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .drawer-import-btn {
    width: 100%; padding: 7px;
    background: none; border: 1px dashed var(--border2);
    border-radius: 5px; color: var(--text3);
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px;
  }
  .drawer-import-btn:hover { color: var(--text2); border-color: var(--border2); background: var(--surface2); }

  /* WALLET LIST */
  .drawer-list {
    flex: 1; overflow-y: auto;
    padding: 12px 20px;
  }
  .drawer-list-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .drawer-list-label {
    font-size: 9px; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .drawer-count {
    font-size: 10px; color: var(--text2);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 1px 7px; border-radius: 10px;
  }

  .wallet-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; margin-bottom: 6px;
    transition: border-color 0.15s;
    animation: slideIn 0.18s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
  .wallet-item:hover { border-color: var(--border2); }
  .wallet-item-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
    box-shadow: 0 0 5px var(--green)88;
  }
  .wallet-item-info { flex: 1; min-width: 0; }
  .wallet-item-name {
    font-size: 11px; font-weight: 600; color: var(--text);
    margin-bottom: 2px; cursor: pointer;
  }
  .wallet-item-name:hover { color: var(--green); }
  .wallet-item-name-input {
    background: none; border: none; border-bottom: 1px solid var(--green)55;
    color: var(--green); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600; outline: none;
    width: 100%; padding: 0 0 1px;
  }
  .wallet-item-addr {
    font-size: 10px; color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .wallet-item-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .wi-btn {
    width: 24px; height: 24px;
    background: none; border: 1px solid var(--border);
    border-radius: 4px; color: var(--text3);
    font-size: 11px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .wi-btn:hover { color: var(--text2); border-color: var(--border2); }
  .wi-btn.del:hover { color: var(--red); border-color: var(--red)55; background: var(--red-dim); }

  /* DRAWER FOOTER */
  .drawer-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    display: flex; gap: 8px;
  }
  .drawer-footer-btn {
    flex: 1; padding: 9px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text2);
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px;
    font-weight: 600;
  }
  .drawer-footer-btn:hover { color: var(--text); border-color: var(--border2); }
  .drawer-footer-btn.export { color: var(--blue); border-color: var(--blue)33; }
  .drawer-footer-btn.export:hover { background: var(--blue-dim); border-color: var(--blue)66; }
  .drawer-footer-btn.clear { color: var(--red); border-color: var(--red)33; }
  .drawer-footer-btn.clear:hover { background: var(--red-dim); border-color: var(--red)66; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 300;
    padding: 10px 16px; border-radius: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
    background: var(--surface3); border: 1px solid var(--border2);
    color: var(--text);
    transform: translateY(8px); opacity: 0;
    transition: all 0.2s; pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { color: var(--green); border-color: var(--green)44; background: var(--green-dim); }
  .toast.error { color: var(--red); border-color: var(--red)44; background: var(--red-dim); }

  .drawer-empty {
    text-align: center; padding: 40px 20px;
    color: var(--text3); font-size: 11px; line-height: 1.8;
  }
  .drawer-empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.4; }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-brand">
    <div class="nav-brand-icon">◈</div>
    LP TRACKER
  </div>
  <div class="nav-sep"></div>
  <div class="nav-info">NETWORK <span>SOLANA</span></div>
  <div class="nav-sep"></div>
  <div class="nav-info">PROTOCOL <span>METEORA DLMM</span></div>
  <div class="nav-right">
    <div class="nav-stat"><div class="nav-stat-val" id="navTotalVal" style="color:var(--green)">—</div><div class="nav-stat-label">Total (SOL)</div></div>
    <div class="nav-sep"></div>
    <div class="nav-stat"><div class="nav-stat-val" id="navTotalPnl">—</div><div class="nav-stat-label">P&L</div></div>
    <div class="nav-sep"></div>
    <div class="nav-stat"><div class="nav-stat-val" id="navWallets">0</div><div class="nav-stat-label">Wallets</div></div>
    <div class="nav-sep"></div>
    <div class="nav-stat" style="align-items:center;">
      <div class="nav-stat-val" style="font-size:10px;color:var(--text3)" id="refreshCountdown">—:——</div>
      <div class="nav-stat-label">Next refresh</div>
    </div>
    <div class="nav-sep"></div>
    <button id="refreshBtn" class="nav-manage-btn" onclick="refreshAll()" style="color:var(--green);border-color:var(--green)44;">↻ Refresh</button>
    <button class="nav-manage-btn" onclick="openSettings()">⚙ Settings</button>
    <div class="pulse-dot"></div>
    <button class="nav-manage-btn" id="manageBtn" onclick="toggleDrawer()">⊞ Manage Wallets</button>
  </div>
</div>

<div class="main" id="mainContent">
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>

<!-- WALLET MANAGER DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title">Wallet <span>Manager</span></div>
    <button class="drawer-close" onclick="toggleDrawer()">✕</button>
  </div>

  <div class="drawer-add">
    <div class="drawer-add-label">Add Wallet</div>
    <div class="drawer-input-row">
      <input class="drawer-input" id="addrInput" placeholder="Solana wallet address..." maxlength="44" oninput="validateInput()" />
      <button class="drawer-add-btn" id="addBtn" onclick="addWallet()" disabled>+ Add</button>
    </div>
    <div class="drawer-input-row" style="margin-bottom:0">
      <input class="drawer-input" id="labelInput" placeholder="Label (optional, e.g. Main wallet)" />
    </div>
    <div style="margin-top:8px">
      <button class="drawer-import-btn" onclick="document.getElementById('fileInput').click()">⬆ Import list from .txt file (one address per line)</button>
      <input type="file" id="fileInput" accept=".txt" style="display:none" onchange="importFromFile(event)" />
    </div>
  </div>

  <div class="drawer-list" id="drawerList">
    <div class="drawer-list-header">
      <div class="drawer-list-label">Tracked Wallets</div>
      <div class="drawer-count" id="walletCount">0</div>
    </div>
    <div id="walletItems"></div>
  </div>

  <div class="drawer-footer">
    <button class="drawer-footer-btn export" onclick="exportWallets()">⬇ Export .txt</button>
    <button class="drawer-footer-btn" onclick="copyAllAddrs()">⎘ Copy All</button>
    <button class="drawer-footer-btn clear" onclick="clearAllWallets()">✕ Clear All</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// STORAGE KEYS
// ═══════════════════════════════════════════════════════════════════
const STORAGE_KEY      = 'lp_tracker_wallets';
const HELIUS_KEY_STORE = 'lp_tracker_helius_key';
const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 minutes

// ═══════════════════════════════════════════════════════════════════
// METEORA DLMM PROGRAM ID
// ═══════════════════════════════════════════════════════════════════
const METEORA_DLMM_PROGRAM = 'LBUZKhRxPF3XUpBCjp4YzTKgLccjZhTSDM9YuVaPwxo';

// ═══════════════════════════════════════════════════════════════════
// WALLET STORAGE
// ═══════════════════════════════════════════════════════════════════
function loadWallets() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveWallets(w) { localStorage.setItem(STORAGE_KEY, JSON.stringify(w)); }
function isValidSolanaAddr(a) { return /^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(a.trim()); }

// ═══════════════════════════════════════════════════════════════════
// HELIUS API KEY
// ═══════════════════════════════════════════════════════════════════
function getHeliosKey() { return localStorage.getItem(HELIUS_KEY_STORE) || ''; }
function saveHeliusKey(k) { localStorage.setItem(HELIUS_KEY_STORE, k.trim()); }

// ═══════════════════════════════════════════════════════════════════
// SETUP SCREEN — shown on first load if no API key
// ═══════════════════════════════════════════════════════════════════
function showSetupScreen() {
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px 40px;max-width:480px;width:100%;">

// ═══════════════════════════════════════════════════════════════════
// HELIUS RPC CALL (still used for getProgramAccounts to get position pubkeys)
// ═══════════════════════════════════════════════════════════════════
async function rpcCall(method, params) {
  const key = getHeliosKey();
  const res = await fetch(`https://mainnet.helius-rpc.com/?api-key=${key}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ jsonrpc: '2.0', id: 1, method, params })
  });
  if (!res.ok) throw new Error(`RPC error ${res.status}`);
  const json = await res.json();
  if (json.error) throw new Error(json.error.message);
  return json.result;
}

// ═══════════════════════════════════════════════════════════════════
// STRATEGY DETECTION — from bin liquidity distribution
// Uses position account lower/upper bin IDs and the pool's active bin
// to detect if liquidity is spread (Spot), at edges (Bid-Ask), or center (Curve)
// ═══════════════════════════════════════════════════════════════════
function detectStrategy(lowerBinId, upperBinId, activeBinId) {
  const totalBins = upperBinId - lowerBinId + 1;
  if (totalBins <= 1) return 'spot';

  // Where is the active bin relative to the position range?
  const activeOffset = activeBinId - lowerBinId;
  const relPos = activeOffset / (totalBins - 1); // 0=bottom, 0.5=center, 1=top

  // If active bin is outside the range — position is out of range, treat as spot
  if (activeBinId < lowerBinId || activeBinId > upperBinId) return 'spot';

  // Narrow range = likely Bid-Ask (concentrated at edges)
  // Wide range centered on active = Curve or Spot
  const rangeWidth = totalBins;
  if (rangeWidth <= 10) return 'bidask';  // very tight range
  if (relPos > 0.3 && relPos < 0.7) return 'curve';  // active bin near center
  return 'spot';
}

// ═══════════════════════════════════════════════════════════════════
// BIN ID → PRICE
// ═══════════════════════════════════════════════════════════════════
function binIdToPrice(binId, binStep) {
  // Meteora pair API returns current_price already in human-readable scale
  // so we just use the raw formula without decimal adjustment
  return Math.pow(1 + binStep / 10000, binId);
}

// ═══════════════════════════════════════════════════════════════════
// FETCH PAIR INFO from Meteora old API (for bin_step + decimals + active bin)
// ═══════════════════════════════════════════════════════════════════
const pairCache = {};
async function fetchPairInfo(pairAddress) {
  if (pairCache[pairAddress]) return pairCache[pairAddress];
  try {
    const res = await fetch(`https://dlmm-api.meteora.ag/pair/${pairAddress}`);
    if (!res.ok) return null;
    const data = await res.json();
    pairCache[pairAddress] = data;
    return data;
  } catch { return null; }
}

// ═══════════════════════════════════════════════════════════════════
// MAIN FETCH — uses dlmm.datapi.meteora.ag/portfolio/open
// Returns balances, PnL, fees, token names all in one call
// ═══════════════════════════════════════════════════════════════════
async function fetchWalletPositions(walletAddress) {
  const res = await fetch(
    `https://dlmm.datapi.meteora.ag/portfolio/open?user=${walletAddress}`
  );
  if (!res.ok) throw new Error(`Portfolio API error: ${res.status}`);
  const data = await res.json();

  const pools = data.pools || [];
  console.log(`[${walletAddress.slice(0,6)}] found ${pools.length} pools, ${data.total?.balances ? '$'+parseFloat(data.total.balances).toFixed(2) : ''}`);

  const positions = [];
  const solPrice = parseFloat(data.solPrice || 0);

  for (const pool of pools) {
    try {
      // Get position-level detail — each pool can have multiple positions
      // but listPositions gives us pubkeys for per-position data
      const positionPubkeys = pool.listPositions || [];

      // Fetch pair info for bin_step + current_price (for price range + strategy)
      const pair = await fetchPairInfo(pool.poolAddress);
      const binStep = pair?.bin_step || 1;

      // Token decimals
      const SOL_MINT  = 'So11111111111111111111111111111111111111112';
      const USDC_MINT = 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v';
      const USDT_MINT = 'Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB';
      const decimalsX = pool.tokenXMint === SOL_MINT ? 9
                      : (pool.tokenXMint === USDC_MINT || pool.tokenXMint === USDT_MINT) ? 6 : 6;
      const decimalsY = pool.tokenYMint === SOL_MINT ? 9
                      : (pool.tokenYMint === USDC_MINT || pool.tokenYMint === USDT_MINT) ? 6 : 6;

      // For each position pubkey, fetch bin details for price range + strategy
      for (const posPubkey of positionPubkeys) {
        // Fetch position account from Helius for bin IDs
        let lowerBinId = 0, upperBinId = 0;
        try {
          const acct = await rpcCall('getAccountInfo', [posPubkey, { encoding: 'base64' }]);
          if (acct?.value?.data?.[0]) {
            const data = Uint8Array.from(atob(acct.value.data[0]), c => c.charCodeAt(0));
            const view = new DataView(data.buffer);
            lowerBinId = view.getInt32(72, true);
            upperBinId = view.getInt32(76, true);
          }
        } catch(e) { /* use 0,0 fallback */ }

        // Active bin from pair current_price
        let activeBinId = 0;
        if (pair?.current_price && binStep) {
          activeBinId = Math.round(Math.log(pair.current_price) / Math.log(1 + binStep / 10000));
        }

        const minPrice = lowerBinId ? binIdToPrice(lowerBinId, binStep) : 0;
        const maxPrice = upperBinId ? binIdToPrice(upperBinId, binStep) : 0;
        const strategy = detectStrategy(lowerBinId, upperBinId, activeBinId);
        const isOutOfRange = pool.outOfRange || false;

        // USD values come directly from the portfolio API
        // If multiple positions in same pool, split evenly (rare edge case)
        const count = positionPubkeys.length || 1;
        const totalUsd      = parseFloat(pool.balancesSol || 0) / count;
        const pnlUsd        = parseFloat(pool.pnlSol || 0) / count;
        const feesUsd       = parseFloat(pool.unclaimedFeesSol || 0) / count;
        const pnlPct        = parseFloat(pool.pnlPctChange || 0);

        positions.push({
          positionAddress: posPubkey,
          poolAddress:     pool.poolAddress,
          pairName:        `${pool.tokenX}/${pool.tokenY}`,
          quoteSymbol:     pool.tokenY,
          minPrice,
          maxPrice,
          totalUsd,
          pnlUsd,
          feesUsd,
          pnlPct,
          strategy,
          isOutOfRange,
        });
      }
    } catch(e) {
      console.warn('Error processing pool:', pool.poolAddress, e);
    }
  }

  return positions;
}

// Compatibility shim
async function parseMeteoraPositions(positions) {
  return positions || [];

// ═══════════════════════════════════════════════════════════════════
// FORMAT PRICE — smart decimal formatting
// ═══════════════════════════════════════════════════════════════════
function fmtPrice(n) {
  if (!n || isNaN(n)) return '—';
  if (n >= 1000)      return n.toLocaleString('en', {maximumFractionDigits: 1});
  if (n >= 1)         return n.toFixed(4);
  if (n >= 0.0001)    return n.toFixed(7);
  if (n >= 0.000001)  return n.toFixed(9);
  return n.toExponential(3);
}

function fmtUSD(n) {
  if (!n || isNaN(n)) return '$—';
  return '$' + n.toLocaleString('en', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function fmtSOL(n) {
  if (n === undefined || n === null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  const decimals = abs >= 10 ? 3 : abs >= 1 ? 4 : abs >= 0.01 ? 5 : 6;
  return n.toFixed(decimals) + ' SOL';
}

function fmtPnl(n) {
  if (!n || isNaN(n)) return '—';
  const sign = n >= 0 ? '+' : '';
  return sign + fmtSOL(n);
}

// {
//   address: string,
//   pair_address: string,
//   owner: string,
//   lower_bin_id: number,
//   upper_bin_id: number,

//   total_y_amount: string,

//   fee_y: string,
//   reward_one: string,
//   reward_two: string,
//   lb_pair: {
//     address, name, mint_x, mint_y,
//     bin_step: number,
//     token_x: { symbol, decimals, amount, usd_amount },
//     token_y: { symbol, decimals, amount, usd_amount },
//     current_price: number,
//     price_usd: number,
//   },
//   position_bin_data: [ { bin_id, price, position_liquidity, bin_liquidity } ]
// }
// ═══════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════
// REFRESH — fetch all wallets and re-render
// ═══════════════════════════════════════════════════════════════════
let refreshTimer = null;
let nextRefreshAt = null;
let countdownTimer = null;

async function refreshAll(silent = false) {
  const wallets = loadWallets();
  if (!wallets.length) {
    renderCards([]);
    return;
  }

  if (!silent) updateRefreshBtn('Refreshing…', true);

  const grid = document.getElementById('cardsGrid');

  // Show loading cards immediately
  grid.innerHTML = '';
  wallets.forEach(w => setCardLoading(w.address, w.name));

  const results = [];

  // Fetch each wallet in parallel
  await Promise.all(wallets.map(async (wallet) => {
    try {
      const raw = await fetchWalletPositions(wallet.address);
      const positions = await parseMeteoraPositions(raw);
      results.push({ wallet, positions, error: null });
    } catch(e) {
      console.error(`Error fetching ${wallet.address}:`, e);
      results.push({ wallet, positions: [], error: e.message });
    }
  }));

  // Render in original wallet order
  const ordered = wallets.map(w => results.find(r => r.wallet.address === w.address) || { wallet: w, positions: [] });
  renderCards(ordered);

  // Update nav totals
  const allPos = ordered.flatMap(r => r.positions);
  const totalVal = allPos.reduce((s, p) => s + (p.totalUsd || 0), 0);
  const totalPnl = allPos.reduce((s, p) => s + (p.pnlUsd || 0), 0);
  document.getElementById('navTotalVal').textContent = fmtSOL(totalVal);
  document.getElementById('navTotalPnl').textContent = fmtPnl(totalPnl);
  document.getElementById('navTotalPnl').className = 'nav-stat-val ' + (totalPnl >= 0 ? 'val-pos' : 'val-neg');
  document.getElementById('navWallets').textContent = wallets.length;

  updateRefreshBtn('↻ Refresh', false);
  scheduleNextRefresh();
  if (!silent) showToast('Data updated', 'success');
}

function scheduleNextRefresh() {
  clearTimeout(refreshTimer);
  clearInterval(countdownTimer);
  nextRefreshAt = Date.now() + REFRESH_INTERVAL;

  refreshTimer = setTimeout(() => refreshAll(true), REFRESH_INTERVAL);

  // Countdown in nav
  countdownTimer = setInterval(() => {
    const remaining = Math.max(0, nextRefreshAt - Date.now());
    const m = Math.floor(remaining / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    const el = document.getElementById('refreshCountdown');
    if (el) el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    if (remaining <= 0) clearInterval(countdownTimer);
  }, 1000);
}

function updateRefreshBtn(label, disabled) {
  const btn = document.getElementById('refreshBtn');
  if (!btn) return;
  btn.textContent = label;
  btn.disabled = disabled;
  btn.style.opacity = disabled ? '0.6' : '1';
}

// WALLET MANAGER
// ═══════════════════════════════════════════════════════════════════
function validateInput() {
  const val = document.getElementById('addrInput').value.trim();
  document.getElementById('addBtn').disabled = !isValidSolanaAddr(val);
}

function addWallet(addr, label) {
  const wallets = loadWallets();
  const address = (addr || document.getElementById('addrInput').value).trim();
  const name = (label || document.getElementById('labelInput').value).trim() || address;
  if (!isValidSolanaAddr(address)) { showToast('Invalid Solana address', 'error'); return; }
  if (wallets.find(w => w.address === address)) { showToast('Already tracked', 'error'); return; }
  wallets.push({ address, name, addedAt: Date.now() });
  saveWallets(wallets);
  renderWalletList();
  if (!addr) {
    document.getElementById('addrInput').value = '';
    document.getElementById('labelInput').value = '';
    document.getElementById('addBtn').disabled = true;
  }
  showToast(`Added: ${name}`, 'success');
  // Trigger refresh to include new wallet
  if (getHeliosKey()) refreshAll(true);
}

function removeWallet(address) {
  saveWallets(loadWallets().filter(w => w.address !== address));
  renderWalletList();
  showToast('Wallet removed', '');
  if (getHeliosKey()) refreshAll(true);
}

function startRename(address) {
  const w = loadWallets().find(w => w.address === address);
  const nameEl = document.getElementById('name_' + address);
  if (!nameEl || !w) return;
  const input = document.createElement('input');
  input.className = 'wallet-item-name-input';
  input.value = w.name;
  input.onblur = () => finishRename(address, input.value);
  input.onkeydown = e => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') renderWalletList(); };
  nameEl.replaceWith(input);
  input.focus(); input.select();
}

function finishRename(address, newName) {
  const wallets = loadWallets();
  const w = wallets.find(w => w.address === address);
  if (w && newName.trim()) { w.name = newName.trim(); saveWallets(wallets); }
  renderWalletList();
}

function copyAddrBtn(btn, addr) {
  navigator.clipboard.writeText(addr).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'copied!';
    btn.style.color = 'var(--green)'; btn.style.borderColor = 'var(--green)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 1500);
  });
}

function copyWalletAddr(address) {
  navigator.clipboard.writeText(address).then(() => showToast('Address copied', 'success'));
}

function copyAllAddrs() {
  const wallets = loadWallets();
  if (!wallets.length) { showToast('No wallets', 'error'); return; }
  navigator.clipboard.writeText(wallets.map(w => w.address).join('\n'))
    .then(() => showToast(`Copied ${wallets.length} addresses`, 'success'));
}

function exportWallets() {
  const wallets = loadWallets();
  if (!wallets.length) { showToast('No wallets', 'error'); return; }
  const blob = new Blob([wallets.map(w => `${w.address}${w.name ? '  # ' + w.name : ''}`).join('\n')], { type: 'text/plain' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: 'lp_tracker_wallets.txt' });
  a.click(); URL.revokeObjectURL(a.href);
  showToast('Exported!', 'success');
}

function importFromFile(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    let added = 0, skipped = 0;
    e.target.result.split('\n').map(l => l.trim()).filter(Boolean).forEach(line => {
      const [rawAddr, ...rest] = line.split('#');
      const addr = rawAddr.trim(), label = rest.join('#').trim();
      if (isValidSolanaAddr(addr) && !loadWallets().find(w => w.address === addr)) { addWallet(addr, label); added++; }
      else skipped++;
    });
    showToast(`Imported ${added}${skipped ? `, ${skipped} skipped` : ''}`, 'success');
  };
  reader.readAsText(file); event.target.value = '';
}

function clearAllWallets() {
  if (!confirm('Remove all tracked wallets?')) return;
  saveWallets([]); renderWalletList();
  renderCards([]);
  showToast('Cleared', '');
}

  container.innerHTML = wallets.map(w => {
    const short = w.address.slice(0,4) + '…' + w.address.slice(-4);
    return `
    <div class="wallet-item">
      <div class="wallet-item-dot"></div>
      <div class="wallet-item-info">
        <div class="wallet-item-name" id="name_${w.address}" onclick="startRename('${w.address}')" title="Click to rename">${w.name}</div>
        <div class="wallet-item-addr" title="${w.address}">${short} · ${new Date(w.addedAt).toLocaleDateString()}</div>
      </div>
      <div class="wallet-item-actions">
        <button class="wi-btn" onclick="copyWalletAddr('${w.address}')" title="Copy">⎘</button>
        <button class="wi-btn del" onclick="removeWallet('${w.address}')" title="Remove">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════
// SETTINGS — change API key
// ═══════════════════════════════════════════════════════════════════
function openSettings() {
  const current = getHeliosKey();
  const masked = current ? current.slice(0,6) + '••••••••' + current.slice(-4) : '';
  const html = `
    <div style="position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;" id="settingsModal" onclick="if(event.target.id==='settingsModal')closeSettings()">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px 32px;max-width:420px;width:90%;">
        <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px;">⚙ Settings</div>
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Helius API Key</div>
        ${current ? `<div style="font-size:10px;color:var(--text2);margin-bottom:8px;">Current: <span style="color:var(--green)">${masked}</span></div>` : ''}
        <div style="display:flex;gap:8px;margin-bottom:16px;">
          <input id="newKeyInput" class="drawer-input" style="flex:1;" placeholder="Paste new Helius API key…" />
          <button class="drawer-add-btn" onclick="updateKey()">Save</button>
        </div>
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Auto-refresh</div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:16px;">Every 5 minutes (hardcoded, adjustable in future)</div>
        <button onclick="closeSettings()" style="width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;">Close</button>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function updateKey() {
  const k = document.getElementById('newKeyInput').value.trim();
  if (!k) { showToast('Enter a key first', 'error'); return; }
  saveHeliusKey(k);
  closeSettings();
  showToast('API key updated!', 'success');
  refreshAll();
}

function closeSettings() {
  const m = document.getElementById('settingsModal');
  if (m) m.remove();
}

// ═══════════════════════════════════════════════════════════════════
// DRAWER TOGGLE
// ═══════════════════════════════════════════════════════════════════
function toggleDrawer() {
  const drawer = document.getElementById('drawer');
  const overlay = document.getElementById('drawerOverlay');
  const btn = document.getElementById('manageBtn');
  const isOpen = drawer.classList.contains('open');
  drawer.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
  btn.classList.toggle('active', !isOpen);
  if (!isOpen) renderWalletList();
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('drawer').classList.contains('open')) toggleDrawer();
});

// ═══════════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2400);
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
renderWalletList();
if (!getHeliosKey()) {
  showSetupScreen();
} else {
  startApp();
}
</script>
</body>
</html>
