<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteora LP Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --surface2: #131920;
    --surface3: #1a2230;
    --border: #1e2d3d;
    --border2: #243344;
    --text: #e2e8f0;
    --text2: #8899aa;
    --text3: #4a6070;
    --green: #00e676;
    --green-dim: #00e67618;
    --red: #ff4757;
    --red-dim: #ff475718;
    --yellow: #ffd32a;
    --blue: #00b4ff;
    --blue-dim: #00b4ff12;
    --purple: #bf80ff;
    --purple-dim: #bf80ff18;
    --orange: #ff8c42;
    --orange-dim: #ff8c4218;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
  }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,12,16,0.97);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; gap: 16px;
    height: 52px;
  }
  .nav-brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 15px;
    color: var(--green); letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .nav-brand-icon {
    width: 24px; height: 24px;
    background: var(--green-dim);
    border: 1px solid var(--green)44;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .nav-sep { width: 1px; height: 24px; background: var(--border); }
  .nav-info { font-size: 10px; color: var(--text3); letter-spacing: 0.5px; }
  .nav-info span { color: var(--text2); }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .nav-stat { display: flex; flex-direction: column; align-items: flex-end; }
  .nav-stat-val { font-size: 12px; font-weight: 600; color: var(--text); }
  .nav-stat-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }
  .pulse-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  /* MAIN */
  .main { padding: 14px 24px; }

  /* CARDS GRID */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    align-items: start;
  }
  .masonry-col { display: flex; flex-direction: column; gap: 12px; }

  /* WALLET CARD */
  .wallet-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .wallet-card:hover {
    border-color: var(--border2);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    background: var(--surface3);
    border-bottom: 1px solid var(--border);
  }
  .card-addr-row { display: flex; align-items: center; gap: 8px; }
  .card-addr {
    font-size: 13px; font-weight: 700; color: var(--blue);
    letter-spacing: 0.3px;
  }
  .card-copy {
    font-size: 9px; color: var(--text3);
    cursor: pointer; padding: 2px 5px;
    border: 1px solid var(--border);
    border-radius: 3px;
    transition: all 0.1s;
    background: none;
    font-family: 'JetBrains Mono', monospace;
  }
  .card-copy:hover { color: var(--text2); border-color: var(--border2); }
  .card-totals { display: flex; gap: 14px; align-items: center; }
  .card-total-val { font-size: 15px; font-weight: 700; color: var(--text); }
  .card-pnl { font-size: 13px; font-weight: 600; }

  /* COLUMN HEADERS */
  .card-col-headers {
    display: grid;
    grid-template-columns: minmax(0,auto) 78px 88px 74px;
    padding: 4px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    justify-content: start;
    gap: 0 4px;
  }
  .cc-h {
    font-size: 10px; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.7px;
    text-align: right;
  }
  .cc-h:first-child { text-align: left; }

  /* POSITION ROW */
  .card-pos-row {
    display: grid;
    grid-template-columns: minmax(0,auto) 78px 88px 74px;
    padding: 6px 14px;
    border-bottom: 1px solid var(--border)44;
    align-items: center;
    transition: background 0.1s;
    justify-content: start;
    gap: 0 4px;
  }
  .card-pos-row:last-child { border-bottom: none; }
  .card-pos-row:hover { background: var(--surface2); }

  .cp-left { display: flex; flex-direction: column; gap: 4px; }
  .cp-pair { font-size: 14px; font-weight: 700; color: var(--text); }

  /* METEORA LINK BUTTON */
  .meteora-link {
    display: inline-flex; align-items: center; gap: 3px;
    text-decoration: none;
    padding: 2px 5px 2px 3px;
    border-radius: 4px;
    border: 1px solid rgba(0,180,255,0.2);
    background: var(--blue-dim);
    transition: all 0.15s;
    cursor: pointer;
  }
  .meteora-link:hover {
    border-color: rgba(0,180,255,0.5);
    background: rgba(0,180,255,0.12);
    transform: translateY(-1px);
  }
  .meteora-logo {
    width: 12px; height: 12px;
    border-radius: 2px;
    object-fit: contain;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
  }
  .meteora-link-text {
    font-size: 8px; font-weight: 600;
    color: var(--blue);
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  /* STRATEGY TAG */


  .cp-cell {
    font-size: 11px; color: var(--text2);
    text-align: right;
    font-weight: 500;
    white-space: nowrap;
  }
  .cp-cell.highlight { color: var(--text); font-weight: 600; }
  .val-pos { color: var(--green) !important; }
  .val-neg { color: var(--red) !important; }

  /* Meteora SVG logo inline */
  .m-svg { width: 12px; height: 12px; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
  .wallet-card { animation: fadeIn 0.25s ease both; }
  .wallet-card:nth-child(1){animation-delay:0.04s}
  .wallet-card:nth-child(2){animation-delay:0.08s}
  .wallet-card:nth-child(3){animation-delay:0.12s}
  .wallet-card:nth-child(4){animation-delay:0.16s}
  .wallet-card:nth-child(5){animation-delay:0.20s}
  .wallet-card:nth-child(6){animation-delay:0.24s}

  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:var(--surface)}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

  /* MANAGE BUTTON */
  .nav-manage-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 5px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.3px;
    transition: all 0.15s;
  }
  .nav-manage-btn:hover { color: var(--text); border-color: var(--green)66; background: var(--green-dim); }
  .nav-manage-btn.active { color: var(--green); border-color: var(--green); background: var(--green-dim); }

  /* DRAWER OVERLAY */
  .drawer-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }

  /* DRAWER PANEL */
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 420px; z-index: 201;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    box-shadow: -8px 0 40px rgba(0,0,0,0.5);
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface3);
    flex-shrink: 0;
  }
  .drawer-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    color: var(--text); letter-spacing: -0.3px;
  }
  .drawer-title span { color: var(--green); }
  .drawer-close {
    width: 28px; height: 28px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text2);
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .drawer-close:hover { color: var(--text); border-color: var(--border2); }

  /* ADD WALLET FORM */
  .drawer-add {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
  }
  .drawer-add-label {
    font-size: 9px; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .drawer-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .drawer-input {
    flex: 1; padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    outline: none; transition: border-color 0.15s;
  }
  .drawer-input:focus { border-color: var(--green)66; }
  .drawer-input::placeholder { color: var(--text3); }
  .drawer-add-btn {
    padding: 8px 14px;
    background: var(--green-dim);
    border: 1px solid var(--green)55;
    border-radius: 5px;
    color: var(--green); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .drawer-add-btn:hover { background: var(--green)22; border-color: var(--green); }
  .drawer-add-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .drawer-import-btn {
    width: 100%; padding: 7px;
    background: none; border: 1px dashed var(--border2);
    border-radius: 5px; color: var(--text3);
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px;
  }
  .drawer-import-btn:hover { color: var(--text2); border-color: var(--border2); background: var(--surface2); }

  /* WALLET LIST */
  .drawer-list {
    flex: 1; overflow-y: auto;
    padding: 12px 20px;
  }
  .drawer-list-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .drawer-list-label {
    font-size: 9px; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .drawer-count {
    font-size: 10px; color: var(--text2);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 1px 7px; border-radius: 10px;
  }

  .wallet-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; margin-bottom: 6px;
    transition: border-color 0.15s;
    animation: slideIn 0.18s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
  .wallet-item:hover { border-color: var(--border2); }
  .wallet-item-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
    box-shadow: 0 0 5px var(--green)88;
  }
  .wallet-item-info { flex: 1; min-width: 0; }
  .wallet-item-name {
    font-size: 11px; font-weight: 600; color: var(--text);
    margin-bottom: 2px; cursor: pointer;
  }
  .wallet-item-name:hover { color: var(--green); }
  .wallet-item-name-input {
    background: none; border: none; border-bottom: 1px solid var(--green)55;
    color: var(--green); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600; outline: none;
    width: 100%; padding: 0 0 1px;
  }
  .wallet-item-addr {
    font-size: 10px; color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .wallet-item-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .wi-btn {
    width: 24px; height: 24px;
    background: none; border: 1px solid var(--border);
    border-radius: 4px; color: var(--text3);
    font-size: 11px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .wi-btn:hover { color: var(--text2); border-color: var(--border2); }
  .wi-btn.del:hover { color: var(--red); border-color: var(--red)55; background: var(--red-dim); }

  /* DRAWER FOOTER */
  .drawer-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    display: flex; gap: 8px;
  }
  .drawer-footer-btn {
    flex: 1; padding: 9px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text2);
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px;
    font-weight: 600;
  }
  .drawer-footer-btn:hover { color: var(--text); border-color: var(--border2); }
  .drawer-footer-btn.export { color: var(--blue); border-color: var(--blue)33; }
  .drawer-footer-btn.export:hover { background: var(--blue-dim); border-color: var(--blue)66; }
  .drawer-footer-btn.clear { color: var(--red); border-color: var(--red)33; }
  .drawer-footer-btn.clear:hover { background: var(--red-dim); border-color: var(--red)66; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 300;
    padding: 10px 16px; border-radius: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
    background: var(--surface3); border: 1px solid var(--border2);
    color: var(--text);
    transform: translateY(8px); opacity: 0;
    transition: all 0.2s; pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { color: var(--green); border-color: var(--green)44; background: var(--green-dim); }
  .toast.error { color: var(--red); border-color: var(--red)44; background: var(--red-dim); }

  .drawer-empty {
    text-align: center; padding: 40px 20px;
    color: var(--text3); font-size: 11px; line-height: 1.8;
  }
  .drawer-empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.4; }

  /* CLOSED POSITIONS SECTION */
  .closed-section { border-top: 1px solid var(--border); }
  .closed-header { display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--bg);border-bottom:1px solid var(--border); }
  .closed-label { font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700; }
  .closed-line { flex:1;height:1px;background:var(--border); }
  .closed-col-headers { display:grid;grid-template-columns:minmax(0,auto) 95px 80px 60px;padding:3px 14px;background:var(--bg);border-bottom:1px solid var(--border);justify-content:start;gap:0 8px; }
  .closed-pos-row { display:grid;grid-template-columns:minmax(0,auto) 95px 80px 60px;padding:6px 14px;border-bottom:1px solid var(--border)33;align-items:center;opacity:.72;transition:opacity .1s;justify-content:start;gap:0 8px; }
  .closed-pos-row:hover { opacity:1; }
  .closed-pos-row:last-child { border-bottom:none; }
  .cp-closed-pair { font-size:12px;font-weight:600;color:var(--text2); }
  .cp-closed-cell { font-size:11px;color:var(--text3);text-align:right; }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-brand">
    <div class="nav-brand-icon">◈</div>
    LP TRACKER
  </div>
  <div class="nav-sep"></div>
  <div class="nav-info">NETWORK <span>SOLANA</span></div>
  <div class="nav-sep"></div>
  <div class="nav-info">PROTOCOL <span>METEORA DLMM</span></div>
  <div class="nav-right">
    <div class="nav-stat" style="align-items:center;">
      <div class="nav-stat-val" style="font-size:10px;color:var(--text3)" id="refreshCountdown">—:——</div>
      <div class="nav-stat-label">Next refresh</div>
    </div>
    <div class="nav-sep"></div>
    <button id="refreshBtn" class="nav-manage-btn" onclick="refreshAll()" style="color:var(--green);border-color:var(--green)44;">↻ Refresh</button>
    <button class="nav-manage-btn" onclick="openSettings()">⚙ Settings</button>
    <div class="pulse-dot"></div>
    <button class="nav-manage-btn" id="manageBtn" onclick="toggleDrawer()">⊞ Manage Wallets</button>
  </div>
</div>

<div class="main" id="mainContent">
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>

<!-- WALLET MANAGER DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title">Wallet <span>Manager</span></div>
    <button class="drawer-close" onclick="toggleDrawer()">✕</button>
  </div>

  <div class="drawer-add">
    <div class="drawer-add-label">Add Wallet</div>
    <div class="drawer-input-row">
      <input class="drawer-input" id="addrInput" placeholder="Solana wallet address..." maxlength="44" oninput="validateInput()" />
      <button class="drawer-add-btn" id="addBtn" onclick="addWallet()" disabled>+ Add</button>
    </div>
    <div class="drawer-input-row" style="margin-bottom:0">
      <input class="drawer-input" id="labelInput" placeholder="Label (optional, e.g. Main wallet)" />
    </div>
    <div style="margin-top:8px">
      <button class="drawer-import-btn" onclick="document.getElementById('fileInput').click()">⬆ Import list from .txt file (one address per line)</button>
      <input type="file" id="fileInput" accept=".txt" style="display:none" onchange="importFromFile(event)" />
    </div>
  </div>

  <div class="drawer-list" id="drawerList">
    <div class="drawer-list-header">
      <div class="drawer-list-label">Tracked Wallets</div>
      <div class="drawer-count" id="walletCount">0</div>
    </div>
    <div id="walletItems"></div>
  </div>

  <div class="drawer-footer">
    <button class="drawer-footer-btn export" onclick="exportWallets()">⬇ Export .txt</button>
    <button class="drawer-footer-btn" onclick="copyAllAddrs()">⎘ Copy All</button>
    <button class="drawer-footer-btn clear" onclick="clearAllWallets()">✕ Clear All</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// STORAGE KEYS
// ═══════════════════════════════════════════════════════════════════
const STORAGE_KEY      = 'lp_tracker_wallets';
const HELIUS_KEY_STORE = 'lp_tracker_helius_key';
const REFRESH_INTERVAL = 30 * 60 * 1000; // 30 minutes

// ═══════════════════════════════════════════════════════════════════
// METEORA DLMM PROGRAM ID
// ═══════════════════════════════════════════════════════════════════
const METEORA_DLMM_PROGRAM = 'LBUZKhRxPF3XUpBCjp4YzTKgLccjZhTSDM9YuVaPwxo';

// ═══════════════════════════════════════════════════════════════════
// WALLET STORAGE
// ═══════════════════════════════════════════════════════════════════
function loadWallets() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveWallets(w) { localStorage.setItem(STORAGE_KEY, JSON.stringify(w)); }
function isValidSolanaAddr(a) { return /^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(a.trim()); }

// ═══════════════════════════════════════════════════════════════════
// SETUP — no API key needed, Meteora datapi is public
// ═══════════════════════════════════════════════════════════════════

// Legacy Helius key functions (kept for settings UI compatibility)
function getHeliosKey() { return localStorage.getItem(HELIUS_KEY_STORE) || ''; }
function saveHeliusKey(k) { localStorage.setItem(HELIUS_KEY_STORE, k.trim()); }

function showSetupScreen() {
  // No setup needed — just start the app
  startApp();
}


// ═══════════════════════════════════════════════════════════════════
// MAIN FETCH
// ═══════════════════════════════════════════════════════════════════
async function fetchWalletPositions(walletAddress) {
  // 1) Fetch open portfolio (pool list)
  const openRes = await fetch(`https://dlmm.datapi.meteora.ag/portfolio/open?user=${walletAddress}&page=1&page_size=20`);
  if (!openRes.ok) throw new Error(`Portfolio API error: ${openRes.status}`);
  const data = await openRes.json();

  const pools = data.pools || [];
  const solPrice = parseFloat(data.solPrice || 0);
  console.log(`[${walletAddress.slice(0,6)}] found ${pools.length} pools, SOL=$${solPrice.toFixed(2)}`);

  // 2) For each pool, fetch per-position PnL data
  const positions = [];

  // Fetch all pool position PnLs in parallel
  const poolPnlPromises = pools.map(pool =>
    fetch(`https://dlmm.datapi.meteora.ag/positions/${pool.poolAddress}/pnl?user=${walletAddress}&status=open&page=1`)
      .then(r => r.ok ? r.json() : null)
      .catch(() => null)
  );
  const poolPnlResults = await Promise.all(poolPnlPromises);

  for (let i = 0; i < pools.length; i++) {
    const pool = pools[i];
    const pnlData = poolPnlResults[i];

    try {
      if (pnlData && pnlData.positions && pnlData.positions.length > 0) {
        // Use per-position data from the PnL API
        for (const pos of pnlData.positions) {
          const unr = pos.unrealizedPnl || {};
          const fees = pos.allTimeFees || {};
          const deposits = pos.allTimeDeposits || {};
          const withdrawals = pos.allTimeWithdrawals || {};

          // Unclaimed fees in SOL
          const unclaimedFeeSolX = parseFloat(unr.unclaimedFeeTokenX?.amountSol || 0);
          const unclaimedFeeSolY = parseFloat(unr.unclaimedFeeTokenY?.amountSol || 0);
          const unclaimedFeesSol = unclaimedFeeSolX + unclaimedFeeSolY;

          // All-time fees in SOL
          const allTimeFeesSol = parseFloat(fees.total?.sol || 0);

          positions.push({
            positionAddress:   pos.positionAddress,
            poolAddress:       pool.poolAddress,
            pairName:          `${pool.tokenX}/${pool.tokenY}`,
            tokenXIcon:        pool.tokenXIcon || '',
            tokenYIcon:        pool.tokenYIcon || '',
            quoteSymbol:       pool.tokenY,
            // Balances
            valueSol:          parseFloat(unr.balancesSol || 0),
            valueUsd:          parseFloat(unr.balances || 0),
            // PnL
            pnlSol:            parseFloat(pos.pnlSol || 0),
            pnlUsd:            parseFloat(pos.pnlUsd || 0),
            pnlPct:            parseFloat(pos.pnlSolPctChange || 0),
            pnlUsdPct:         parseFloat(pos.pnlPctChange || 0),
            // Fees
            unclaimedFeesSol,
            allTimeFeesSol,
            // Deposits & Withdrawals
            totalDepositSol:   parseFloat(deposits.total?.sol || 0),
            totalWithdrawalSol:parseFloat(withdrawals.total?.sol || 0),
            // Range
            isOutOfRange:      pos.isOutOfRange || false,
            lowerBinId:        pos.lowerBinId || 0,
            upperBinId:        pos.upperBinId || 0,
            activeBinId:       pos.poolActiveBinId || 0,
            minPrice:          parseFloat(pos.minPrice || 0),
            maxPrice:          parseFloat(pos.maxPrice || 0),
            activePrice:       parseFloat(pos.poolActivePrice || 0),
            // Meta
            createdAt:         pos.createdAt || 0,
            feePerTvl24h:      parseFloat(pool.feePerTvl24h || 0),
          });
        }
      } else {
        // Fallback: use pool-level data if position PnL API fails
        const count = (pool.listPositions || []).length || 1;
        for (const posPubkey of (pool.listPositions || [])) {
          positions.push({
            positionAddress: posPubkey,
            poolAddress:     pool.poolAddress,
            pairName:        `${pool.tokenX}/${pool.tokenY}`,
            tokenXIcon:      pool.tokenXIcon || '',
            tokenYIcon:      pool.tokenYIcon || '',
            quoteSymbol:     pool.tokenY,
            valueSol:        parseFloat(pool.balancesSol || 0) / count,
            valueUsd:        parseFloat(pool.balances || 0) / count,
            pnlSol:          parseFloat(pool.pnlSol || 0) / count,
            pnlUsd:          parseFloat(pool.pnl || 0) / count,
            pnlPct:          parseFloat(pool.pnlSolPctChange || 0),
            pnlUsdPct:       parseFloat(pool.pnlPctChange || 0),
            unclaimedFeesSol:parseFloat(pool.unclaimedFeesSol || 0) / count,
            allTimeFeesSol:  0,
            totalDepositSol: parseFloat(pool.totalDepositSol || 0) / count,
            totalWithdrawalSol: 0,
            isOutOfRange:    pool.outOfRange || false,
            lowerBinId: 0, upperBinId: 0, activeBinId: 0,
            minPrice: 0, maxPrice: 0, activePrice: parseFloat(pool.poolPrice || 0),
            createdAt: 0,
            feePerTvl24h:    parseFloat(pool.feePerTvl24h || 0),
          });
        }
      }
    } catch(e) {
      console.warn('Error processing pool:', pool.poolAddress, e);
    }
  }

  // 3) Fetch closed positions using per-position PnL API
  let closedPositions = [];
  try {
    // First get pool list from general portfolio to find pools with closed positions
    const closedRes = await fetch(`https://dlmm.datapi.meteora.ag/portfolio?user=${walletAddress}&pageSize=20`);
    if (closedRes.ok) {
      const cd = await closedRes.json();
      const poolsWithClosed = (cd.pools || []).filter(p => p.lastClosedAt);

      // For each pool with closed positions, fetch per-position closed PnL in parallel
      const closedPnlResults = await Promise.all(
        poolsWithClosed.map(pool =>
          fetch(`https://dlmm.datapi.meteora.ag/positions/${pool.poolAddress}/pnl?user=${walletAddress}&status=closed&page=1`)
            .then(r => r.ok ? r.json() : null)
            .catch(() => null)
        )
      );

      for (let i = 0; i < poolsWithClosed.length; i++) {
        const pool = poolsWithClosed[i];
        const pnlData = closedPnlResults[i];

        if (pnlData && pnlData.positions && pnlData.positions.length > 0) {
          // Use accurate per-position data
          for (const pos of pnlData.positions) {
            const fees = pos.allTimeFees || {};
            closedPositions.push({
              pairName:        `${pool.tokenX}/${pool.tokenY}`,
              poolAddress:     pool.poolAddress,
              positionAddress: pos.positionAddress,
              closedAt:        pos.closedAt || pool.lastClosedAt,
              pnlSol:          parseFloat(pos.pnlSol || 0),
              pnlPct:          parseFloat(pos.pnlSolPctChange || 0),
              totalFeesSol:    parseFloat(fees.total?.sol || 0),
            });
          }
        } else {
          // Fallback: pool-level data if per-position API fails
          closedPositions.push({
            pairName:        `${pool.tokenX}/${pool.tokenY}`,
            poolAddress:     pool.poolAddress,
            positionAddress: '',
            closedAt:        pool.lastClosedAt,
            pnlSol:          parseFloat(pool.pnlSol || 0),
            pnlPct:          parseFloat(pool.pnlSolPctChange || 0),
            totalFeesSol:    parseFloat(pool.totalFeeSol || 0),
          });
        }
      }

      // Sort by close time descending, take last 5
      closedPositions.sort((a, b) => (b.closedAt || 0) - (a.closedAt || 0));
      closedPositions = closedPositions.slice(0, 3);
    }
  } catch(e) { console.warn('closed fetch error', e); }

  return { positions, closedPositions, solPrice };
}

// Compatibility shim
async function parseMeteoraPositions(data) {
  return data?.positions || data || [];
}

// ═══════════════════════════════════════════════════════════════════
// FORMAT HELPERS
// ═══════════════════════════════════════════════════════════════════
function fmtUSD(n) {
  if (!n || isNaN(n)) return '$—';
  return '$' + n.toLocaleString('en', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function fmtSOL(n) {
  if (n === undefined || n === null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  const decimals = abs >= 10 ? 3 : abs >= 1 ? 4 : abs >= 0.01 ? 5 : 6;
  return n.toFixed(decimals) + ' SOL';
}

function fmtPnl(n) {
  if (!n || isNaN(n)) return '—';
  const sign = n >= 0 ? '+' : '';
  return sign + fmtSOL(n);
}

function fmtPrice(n) {
  if (!n || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1000) return n.toFixed(1);
  if (abs >= 1) return n.toFixed(2);
  if (abs >= 0.001) return n.toFixed(4);
  if (abs >= 0.000001) return n.toFixed(7);
  return n.toExponential(2);
}

function fmtMinutes(ts) {
  if (!ts) return '';
  const mins = Math.floor((Date.now() / 1000 - ts) / 60);
  if (mins < 0) return 'just now';
  return mins.toLocaleString('en') + ' min ago';
}


function fmtTime(ts) {
  // ts is unix seconds
  const diff = Math.floor(Date.now() / 1000) - ts;
  if (diff < 60)   return diff + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

// ═══════════════════════════════════════════════════════════════════
// CLOSED SECTION BUILDER
// ═══════════════════════════════════════════════════════════════════
function buildClosedSection(closedPositions) {
  const closed = closedPositions || [];
  if (!closed.length) return '';
  const chStyle = 'font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px';
  const rows = closed.map(function(cp) {
    const pc = cp.pnlSol >= 0 ? 'val-pos' : 'val-neg';
    const pct = cp.pnlPct ? ' (' + (cp.pnlPct >= 0 ? '+' : '') + cp.pnlPct.toFixed(1) + '%)' : '';
    return '<div class="closed-pos-row">'
      + '<div class="cp-closed-pair">' + cp.pairName + '</div>'
      + '<div class="cp-closed-cell ' + pc + '">' + fmtPnl(cp.pnlSol) + '<span style="font-size:9px;opacity:.7">' + pct + '</span></div>'
      + '<div class="cp-closed-cell" style="color:var(--blue)">' + fmtSOL(cp.totalFeesSol) + '</div>'
      + '<div class="cp-closed-cell">' + fmtTime(cp.closedAt) + '</div>'
      + '</div>';
  }).join('');
  return '<div class="closed-section">'
    + '<div class="closed-header"><div class="closed-label">Recent Closed</div><div class="closed-line"></div></div>'
    + '<div style="background:var(--bg)">'
    + '<div class="closed-col-headers">'
    + '<div style="' + chStyle + '">Pair</div>'
    + '<div style="' + chStyle + ';text-align:right">P&L (SOL)</div>'
    + '<div style="' + chStyle + ';text-align:right">Fees (SOL)</div>'
    + '<div style="' + chStyle + ';text-align:right">Closed</div>'
    + '</div>'
    + rows
    + '</div></div>';
}

function renderCards(walletsData) {
  const grid = document.getElementById('cardsGrid');

        <div style="font-size:28px;margin-bottom:12px;opacity:0.4;">◈</div>
        <div style="font-size:12px;">No wallets tracked yet.</div>
        <div style="font-size:11px;margin-top:6px;">Click <strong style="color:var(--text2)">⊞ Manage Wallets</strong> to add addresses.</div>
      </div>`;
    return;
  }

  const METEORA_SVG = `<svg class="m-svg" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="16" fill="#0d1117"/><path d="M8 20L16 8L24 20H8Z" fill="#00b4ff" opacity="0.9"/><path d="M11 20L16 13L21 20H11Z" fill="#00e676" opacity="0.8"/></svg>`;

  // Masonry: 3 columns, distribute wallets top-to-bottom
  const cols = [[], [], []];
  walletsData.forEach((wd, i) => cols[i % 3].push({ wd, wi: i }));
  grid.innerHTML = cols.map(col =>
    `<div class="masonry-col">${col.map(({wd, wi}) => {
      const wallet = wd.wallet;
      const positions = wd.positions || [];
      const short = wallet.address.slice(0,6) + '…' + wallet.address.slice(-6);

      const totalVal = positions.reduce((s, p) => s + (p.valueSol || 0), 0);
      const totalPnl = positions.reduce((s, p) => s + (p.pnlSol || 0), 0);
      const pnlClass = totalPnl >= 0 ? 'val-pos' : 'val-neg';

      const posRows = positions.length === 0
        ? `<div style="padding:16px 14px;font-size:11px;color:var(--text3);text-align:center;">No active DLMM positions</div>`
        : positions.map(pos => {
            const pClass = (pos.pnlSol || 0) >= 0 ? 'val-pos' : 'val-neg';
            const poolUrl = `https://app.meteora.ag/dlmm/${pos.poolAddress}`;
            const pnlPctStr = pos.pnlPct ? ` (${pos.pnlPct >= 0 ? '+' : ''}${pos.pnlPct.toFixed(1)}%)` : '';
            const oorTag = pos.isOutOfRange ? `<span style="font-size:7px;padding:1px 3px;border-radius:2px;background:var(--red-dim);color:var(--red);border:1px solid var(--red)33;font-weight:700;letter-spacing:0.2px;line-height:1;">off rng</span>` : '';
            return `
            <div class="card-pos-row">
              <div class="cp-left">
                <div style="display:flex;align-items:center;gap:5px;">
                  <div class="cp-pair">${pos.pairName}</div>
                  <a class="meteora-link" href="${poolUrl}" target="_blank">${METEORA_SVG}<span class="meteora-link-text">Pool</span></a>
                  ${oorTag}
                </div>
                ${pos.minPrice ? `<div style="font-size:10px;font-weight:500;margin-top:2px;"><span style="color:var(--green)">${fmtPrice(pos.minPrice)}</span> <span style="color:var(--text3)">—</span> <span style="color:var(--purple)">${fmtPrice(pos.activePrice)}</span> <span style="color:var(--text3)">—</span> <span style="color:var(--green)">${fmtPrice(pos.maxPrice)}</span></div>` : ''}
                ${pos.createdAt ? `<div style="font-size:9px;color:var(--text3);margin-top:1px;">opened ${fmtMinutes(pos.createdAt)}</div>` : ''}
              </div>
              <div class="cp-cell highlight">${fmtSOL(pos.valueSol)}</div>
              <div class="cp-cell ${pClass}">${fmtPnl(pos.pnlSol)}<span style="font-size:9px;opacity:0.7">${pnlPctStr}</span></div>
              <div class="cp-cell" style="color:var(--blue)">${fmtSOL(pos.unclaimedFeesSol)}</div>
            </div>`;
          }).join('');

      return `
      <div class="wallet-card" style="animation-delay:${wi * 0.06}s">
        <div class="card-header">
          <div class="card-addr-row">
            <div class="card-addr" title="${wallet.address}">${short}</div>
            <button class="card-copy" onclick="copyAddrBtn(this,'${wallet.address}')">copy</button>
          </div>
          <div class="card-totals">
            <div class="card-total-val">${fmtSOL(totalVal)}</div>
            <div class="card-pnl ${pnlClass}">${fmtPnl(totalPnl)}</div>
          </div>
        </div>
        <div class="card-col-headers">
          <div class="cc-h" style="text-align:left">Pair</div>
          <div class="cc-h">Value (SOL)</div>
          <div class="cc-h">P&L (SOL)</div>
          <div class="cc-h">Fees (SOL)</div>
        </div>
        ${posRows}
        ${buildClosedSection(wd.closedPositions)}
      </div>`;
    }).join('')}</div>`
  ).join('');
}

// ═══════════════════════════════════════════════════════════════════
// REFRESH
// ═══════════════════════════════════════════════════════════════════
let refreshTimer = null;
let nextRefreshAt = null;
let countdownTimer = null;

async function refreshAll(silent = false) {
  const wallets = loadWallets();
  if (!wallets.length) {
    renderCards([]);
    return;
  }

  if (!silent) updateRefreshBtn('Refreshing…', true);

  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  wallets.forEach(w => setCardLoading(w.address, w.name));

  const results = [];

  await Promise.all(wallets.map(async (wallet) => {
    try {
      const raw = await fetchWalletPositions(wallet.address);
      const positions = await parseMeteoraPositions(raw);
      const closedPositions = raw?.closedPositions || [];
      results.push({ wallet, positions, closedPositions, error: null });
    } catch(e) {
      console.error(`Error fetching ${wallet.address}:`, e);
      results.push({ wallet, positions: [], closedPositions: [], error: e.message });
    }
  }));

  const ordered = wallets.map(w => results.find(r => r.wallet.address === w.address) || { wallet: w, positions: [] });
  renderCards(ordered);

  updateRefreshBtn('↻ Refresh', false);
  scheduleNextRefresh();
  if (!silent) showToast('Data updated', 'success');
}

function scheduleNextRefresh() {
  clearTimeout(refreshTimer);
  clearInterval(countdownTimer);
  nextRefreshAt = Date.now() + REFRESH_INTERVAL;

  refreshTimer = setTimeout(() => refreshAll(true), REFRESH_INTERVAL);

  countdownTimer = setInterval(() => {
    const remaining = Math.max(0, nextRefreshAt - Date.now());
    const m = Math.floor(remaining / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    const el = document.getElementById('refreshCountdown');
    if (el) el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    if (remaining <= 0) clearInterval(countdownTimer);
  }, 1000);
}

function updateRefreshBtn(label, disabled) {
  const btn = document.getElementById('refreshBtn');
  if (!btn) return;
  btn.textContent = label;
  btn.disabled = disabled;
  btn.style.opacity = disabled ? '0.6' : '1';
}

// ═══════════════════════════════════════════════════════════════════
// WALLET MANAGER
// ═══════════════════════════════════════════════════════════════════
function validateInput() {
  const val = document.getElementById('addrInput').value.trim();
  document.getElementById('addBtn').disabled = !isValidSolanaAddr(val);
}

function addWallet(addr, label) {
  const wallets = loadWallets();
  const address = (addr || document.getElementById('addrInput').value).trim();
  const name = (label || document.getElementById('labelInput').value).trim() || address;
  if (!isValidSolanaAddr(address)) { showToast('Invalid Solana address', 'error'); return; }
  if (wallets.find(w => w.address === address)) { showToast('Already tracked', 'error'); return; }
  wallets.push({ address, name, addedAt: Date.now() });
  saveWallets(wallets);
  renderWalletList();
  if (!addr) {
    document.getElementById('addrInput').value = '';
    document.getElementById('labelInput').value = '';
    document.getElementById('addBtn').disabled = true;
  }
  showToast(`Added: ${name}`, 'success');
  refreshAll(true);
}

function removeWallet(address) {
  saveWallets(loadWallets().filter(w => w.address !== address));
  renderWalletList();
  showToast('Wallet removed', '');
  refreshAll(true);
}

function startRename(address) {
  const w = loadWallets().find(w => w.address === address);
  const nameEl = document.getElementById('name_' + address);
  if (!nameEl || !w) return;
  const input = document.createElement('input');
  input.className = 'wallet-item-name-input';
  input.value = w.name;
  input.onblur = () => finishRename(address, input.value);
  input.onkeydown = e => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') renderWalletList(); };
  nameEl.replaceWith(input);
  input.focus(); input.select();
}

function finishRename(address, newName) {
  const wallets = loadWallets();
  const w = wallets.find(w => w.address === address);
  if (w && newName.trim()) { w.name = newName.trim(); saveWallets(wallets); }
  renderWalletList();
}

function copyAddrBtn(btn, addr) {
  navigator.clipboard.writeText(addr).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'copied!';
    btn.style.color = 'var(--green)'; btn.style.borderColor = 'var(--green)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 1500);
  });
}

function copyWalletAddr(address) {
  navigator.clipboard.writeText(address).then(() => showToast('Address copied', 'success'));
}

function copyAllAddrs() {
  const wallets = loadWallets();
  if (!wallets.length) { showToast('No wallets', 'error'); return; }
  navigator.clipboard.writeText(wallets.map(w => w.address).join('\n'))
    .then(() => showToast(`Copied ${wallets.length} addresses`, 'success'));
}

function exportWallets() {
  const wallets = loadWallets();
  if (!wallets.length) { showToast('No wallets', 'error'); return; }
  const blob = new Blob([wallets.map(w => `${w.address}${w.name ? '  # ' + w.name : ''}`).join('\n')], { type: 'text/plain' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: 'lp_tracker_wallets.txt' });
  a.click(); URL.revokeObjectURL(a.href);
  showToast('Exported!', 'success');
}

function importFromFile(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    let added = 0, skipped = 0;
    e.target.result.split('\n').map(l => l.trim()).filter(Boolean).forEach(line => {
      const [rawAddr, ...rest] = line.split('#');
      const addr = rawAddr.trim(), label = rest.join('#').trim();
      if (isValidSolanaAddr(addr) && !loadWallets().find(w => w.address === addr)) { addWallet(addr, label); added++; }
      else skipped++;
    });
    showToast(`Imported ${added}${skipped ? `, ${skipped} skipped` : ''}`, 'success');
  };
  reader.readAsText(file); event.target.value = '';
}

function clearAllWallets() {
  if (!confirm('Remove all tracked wallets?')) return;
  saveWallets([]); renderWalletList();
  renderCards([]);
  showToast('Cleared', '');
}

  container.innerHTML = wallets.map(w => {

    return `
    <div class="wallet-item">
      <div class="wallet-item-dot"></div>
      <div class="wallet-item-info">
        <div class="wallet-item-name" id="name_${w.address}" onclick="startRename('${w.address}')" title="Click to rename">${w.name}</div>
        <div class="wallet-item-addr" title="${w.address}">${short} · ${new Date(w.addedAt).toLocaleDateString()}</div>
      </div>
      <div class="wallet-item-actions">
        <button class="wi-btn" onclick="copyWalletAddr('${w.address}')" title="Copy">⎘</button>
        <button class="wi-btn del" onclick="removeWallet('${w.address}')" title="Remove">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════════════
function openSettings() {
  const html = `
    <div style="position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;" id="settingsModal" onclick="if(event.target.id==='settingsModal')closeSettings()">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px 32px;max-width:420px;width:90%;">
        <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px;">⚙ Settings</div>
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Data Source</div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:16px;">Meteora DLMM DataPI <span style="color:var(--green);">● Connected</span></div>
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Auto-refresh</div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:16px;">Every 30 minutes</div>
        <button onclick="closeSettings()" style="width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;">Close</button>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}


function closeSettings() {
  const m = document.getElementById('settingsModal');
  if (m) m.remove();
}

// ═══════════════════════════════════════════════════════════════════
// DRAWER TOGGLE
// ═══════════════════════════════════════════════════════════════════
function toggleDrawer() {
  const drawer = document.getElementById('drawer');
  const overlay = document.getElementById('drawerOverlay');
  const btn = document.getElementById('manageBtn');
  const isOpen = drawer.classList.contains('open');
  drawer.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
  btn.classList.toggle('active', !isOpen);
  if (!isOpen) renderWalletList();
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('drawer').classList.contains('open')) toggleDrawer();
});

// ═══════════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2400);
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
// Pre-load wallet if none exist
const DEFAULT_WALLET = '7tB8WHYKxSpxcL4UgaAcXFVfoLw37rJqfkBPnv8ChYQi';
(function ensureDefaultWallet() {
  const wallets = loadWallets();
  if (!wallets.length) {
    wallets.push({ address: DEFAULT_WALLET, name: DEFAULT_WALLET, addedAt: Date.now() });
    saveWallets(wallets);
  }
})();

renderWalletList();
startApp();
</script>
